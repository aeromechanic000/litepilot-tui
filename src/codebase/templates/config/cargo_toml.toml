# @LITE_DESC Cargo.toml template with common dependencies, profiles, features, and metadata sections
# @LITE_SCENE rust-project
# @LITE_TAGS rust,cargo,toml,config,project

[package]
name = "project-name"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Your Name <you@example.com>"]
description = "A brief description of your project"
readme = "README.md"
homepage = "https://github.com/username/project-name"
repository = "https://github.com/username/project-name"
license = "MIT OR Apache-2.0"
keywords = ["cli", "tool", "utility"]
categories = ["command-line-utilities", "development-tools"]
include = [
    "src/**/*.rs",
    "Cargo.toml",
    "README.md",
    "LICENSE",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.release]
pre-release-replacements = [
  {file="CHANGELOG.md", search="Unreleased", replace="{{version}}", min=1},
  {file="CHANGELOG.md", search="\\.\\.\\.HEAD", replace="...{{tag_name}}", exactly=1},
  {file="CHANGELOG.md", search="ReleaseDate", replace="{{date}}", min=1},
  {file="CHANGELOG.md", search="<!-- next-header -->", replace="<!-- next-header -->\n\n## [Unreleased] - ReleaseDate", exactly=1},
  {file="CHANGELOG.md", search="<!-- next-url -->", replace="<!-- next-url -->\n[Unreleased]: https://github.com/username/{{crate_name}}/compare/{{tag_name}}...HEAD", exactly=1},
]

# Binary configuration
[[bin]]
name = "mycli"
path = "src/main.rs"

# Library configuration (if this is also a library)
[lib]
name = "project_name"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

# Feature flags
[features]
default = ["std"]
std = []
alloc = []
# Feature combinations
full = ["std", "serde", "json"]
# Optional features
serde = ["dep:serde", "dep:serde_json"]
json = ["serde"]
tokio = ["dep:tokio"]
tracing = ["dep:tracing", "dep:tracing-subscriber"]

# Dependencies
[dependencies]
# Core utilities
anyhow = "1.0"
thiserror = "1.0"

# CLI utilities
clap = { version = "4.4", features = ["derive", "env", "color"], optional = true }
console = "0.15"
indicatif = "0.17"

# Async runtime (optional)
tokio = { version = "1.35", features = ["full"], optional = true }
async-trait = { version = "0.1", optional = true }

# Serialization
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }

# Logging
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
log = { version = "0.4", optional = true }

# File I/O and formats
toml = { version = "0.8", optional = true }
regex = { version = "1.10", optional = true }
glob = { version = "0.3", optional = true }

# HTTP client (optional)
reqwest = { version = "0.11", features = ["json"], optional = true }

# Error handling
color-eyre = "0.6"

# Development dependencies (dev-only)
[dev-dependencies]
# Testing
criterion = "0.5"
proptest = "1.4"
quickcheck = "1.0"
fake = { version = "2.9", features = ["derive"] }

# Mocking
mockall = "0.12"

# Test utilities
tempfile = "3.9"
assert_cmd = "2.0"
predicates = "3.0"

# Build dependencies
[build-dependencies]
cc = "1.0"

# Benchmark configuration
[[bench]]
name = "main"
harness = false

# Example configurations
[[example]]
name = "simple"
path = "examples/simple.rs"

[[example]]
name = "advanced"
path = "examples/advanced.rs"
required-features = ["tokio"]

# Test configuration
[[test]]
name = "integration"
path = "tests/integration.rs"

# Profile optimization
[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
debug = false
split-debuginfo = "packed"
strip = true
lto = true
codegen-units = 1
panic = "abort"

[profile.release.package."*"]
opt-level = 3

[profile.dev.build-override]
opt-level = 3

[profile.release.build-override]
opt-level = 3

[profile.bench]
inherits = "release"
debug = true

[profile.min]
inherits = "release"
opt-level = "z"
lto = true
codegen-units = 1
strip = true

