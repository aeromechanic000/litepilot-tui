# @LITE_DESC Docker Compose with web app, database, redis, volumes, networks, environment vars, and health checks
# @LITE_SCENE Multi-service application orchestration with development and production configurations
# @LITE_TAGS docker, compose, orchestration, multi-service

version: '3.9'

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge
    internal: true

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  logs:
    driver: local

# ============================================================================
# SERVICES
# ============================================================================

services:
  # ========================================================================
  # WEB APPLICATION
  # ========================================================================

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: myapp:latest
    container_name: myapp_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://appuser:apppassword@postgres:5432/appdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-default-secret-key}
      - DEBUG=false
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - ALLOWED_HOSTS=localhost,api.example.com
      - CORS_ORIGINS=https://example.com
    volumes:
      - media_files:/app/media
      - static_files:/app/static
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================================================================
  # POSTGRES DATABASE
  # ========================================================================

  postgres:
    image: postgres:15-alpine
    container_name: myapp_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"

  # ========================================================================
  # REDIS CACHE
  # ========================================================================

  redis:
    image: redis:7-alpine
    container_name: myapp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================================================
  # NGINX REVERSE PROXY
  # ========================================================================

  nginx:
    image: nginx:alpine
    container_name: myapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/static:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================================================
  # WORKER FOR BACKGROUND TASKS
  # ========================================================================

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: myapp:latest
    container_name: myapp_worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://appuser:apppassword@postgres:5432/appdb
      - REDIS_URL=redis://:redispassword@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-default-secret-key}
      - WORKER_CONCURRENCY=4
    volumes:
      - media_files:/app/media
      - logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================================================
  # SCHEDULER FOR PERIODIC TASKS
  # ========================================================================

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: myapp:latest
    container_name: myapp_scheduler
    restart: unless-stopped
    command: celery -A app.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://appuser:apppassword@postgres:5432/appdb
      - REDIS_URL=redis://:redispassword@redis:6379/0
    volumes:
      - logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  # ========================================================================
  # PROMETHEUS MONITORING
  # ========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: myapp_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend

  # ========================================================================
  # GRAFANA VISUALIZATION
  # ========================================================================

  grafana:
    image: grafana/grafana:latest
    container_name: myapp_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - frontend

# ============================================================================
# DEVELOPMENT OVERRIDE
# ============================================================================

# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Override file contents would be in docker-compose.dev.yml

# Example development services:
# services:
#   web-dev:
#     build:
#       target: development
#     volumes:
#       - .:/app
#     environment:
#       - DEBUG=true
#     command: npm run dev