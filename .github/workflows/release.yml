name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: litepilot-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            binary: litepilot-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: litepilot-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: litepilot-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: target/${{ matrix.target }}/release/litepilot

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare bin directory
        run: |
          mkdir -p bin
          cp artifacts/litepilot-darwin-arm64/litepilot bin/litepilot-darwin-arm64
          cp artifacts/litepilot-darwin-x64/litepilot bin/litepilot-darwin-x64
          cp artifacts/litepilot-linux-x64/litepilot bin/litepilot-linux-x64
          cp artifacts/litepilot-linux-arm64/litepilot bin/litepilot-linux-arm64
          chmod +x bin/litepilot-*
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
